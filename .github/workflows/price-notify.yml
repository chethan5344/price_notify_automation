name: Price Notify

on:
  schedule:
    # Runs at 9:00 AM and 5:00 PM IST (3:30 AM and 11:30 AM UTC)
    - cron: '30 3,11 * * *'
  workflow_dispatch:

# Required so the action can push the updated json back to the repo
permissions:
  contents: write

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm start

      - name: Commit and push cache
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update prices cache"
          file_pattern: cache/prices.json
          
